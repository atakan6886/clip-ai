name: CPU Modes Hang Test

on:
  workflow_dispatch:

jobs:
  cpu-modes:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg
        shell: powershell
        run: |
          choco install ffmpeg -y --no-progress
          ffmpeg -version
          ffprobe -version

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install numpy psutil opencv-python

      - name: Run CPU modes + all functions smoke test
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python .github/scripts/cpu_modes_smoke.py

      - name: Upload logs/artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpu-modes-artifacts
          path: |
            _cpu_test_output
            C:\Users\runneradmin\clip_ai.log
            C:\Users\runneradmin\clip_ai_errors.log
