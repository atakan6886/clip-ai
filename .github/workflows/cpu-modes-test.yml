name: CPU Modes Hang Test

on:
  workflow_dispatch:

jobs:
  cpu-modes:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg
        shell: powershell
        run: |
          choco install ffmpeg -y --no-progress
          ffmpeg -version
          ffprobe -version

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install numpy psutil opencv-python

      - name: Run CPU modes + all functions smoke test
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python .github/scripts/cpu_modes_smoke.py

      - name: Collect logs/artifacts into workspace
        if: always()
        shell: powershell
        run: |
          $dst = Join-Path $env:GITHUB_WORKSPACE "_cpu_test_artifacts"
          New-Item -ItemType Directory -Force -Path $dst | Out-Null

          $outDir = Join-Path $env:GITHUB_WORKSPACE "_cpu_test_output"
          if (Test-Path $outDir) {
            Copy-Item $outDir (Join-Path $dst "_cpu_test_output") -Recurse -Force
          }

          $log1 = Join-Path $env:USERPROFILE "clip_ai.log"
          $log2 = Join-Path $env:USERPROFILE "clip_ai_errors.log"
          if (Test-Path $log1) { Copy-Item $log1 (Join-Path $dst "clip_ai.log") -Force }
          if (Test-Path $log2) { Copy-Item $log2 (Join-Path $dst "clip_ai_errors.log") -Force }

      - name: Upload logs/artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpu-modes-artifacts
          path: _cpu_test_artifacts
          if-no-files-found: warn
